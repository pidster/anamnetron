name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
          targets: wasm32-unknown-unknown

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Test
        run: cargo test

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Audit
        run: cargo audit

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked

      - name: WASM build
        run: wasm-pack build crates/wasm --target web

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Web install
        run: npm ci
        working-directory: web

      - name: Web test
        run: npm test
        working-directory: web

      - name: Conformance check
        id: conformance
        continue-on-error: true
        run: |
          cargo run --bin svt -- import design/architecture.yaml
          cargo run --bin svt -- analyze .
          cargo run --bin svt -- check --analysis --format json > conformance.json

      - name: Conformance summary
        if: always() && steps.conformance.outcome != 'skipped'
        run: |
          if [ -f conformance.json ]; then
            TOTAL=$(jq '.constraint_results | length' conformance.json)
            PASS=$(jq '.summary.passed' conformance.json)
            FAIL=$(jq '.summary.failed' conformance.json)
            WARN=$(jq '.summary.warned' conformance.json)
            NOT_EVAL=$(jq '.summary.not_evaluable' conformance.json)

            echo "## Conformance Report" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "| Status | Count |" >> "$GITHUB_STEP_SUMMARY"
            echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
            echo "| Pass | $PASS |" >> "$GITHUB_STEP_SUMMARY"
            echo "| Fail | $FAIL |" >> "$GITHUB_STEP_SUMMARY"
            echo "| Warn | $WARN |" >> "$GITHUB_STEP_SUMMARY"
            echo "| Not Evaluable | $NOT_EVAL |" >> "$GITHUB_STEP_SUMMARY"
            echo "| **Total** | **$TOTAL** |" >> "$GITHUB_STEP_SUMMARY"

            if [ "$FAIL" -gt 0 ]; then
              echo "" >> "$GITHUB_STEP_SUMMARY"
              echo "### Failures" >> "$GITHUB_STEP_SUMMARY"
              echo "" >> "$GITHUB_STEP_SUMMARY"
              jq -r '.constraint_results[] | select(.status == "fail") | "- **\(.constraint_name)**: \(.message)"' conformance.json >> "$GITHUB_STEP_SUMMARY"
            fi
          else
            echo "## Conformance Report" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Conformance check did not produce output." >> "$GITHUB_STEP_SUMMARY"
          fi
